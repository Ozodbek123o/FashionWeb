name: FashionWeb Production CD Deploy

on:
  push:
    branches: ['main']

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Deploy Production to AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            # Loyiha papkasiga kirish
            cd ~/FashionWeb

            # Mahalliy o'zgarishlarni bekor qilib, GitHub'dan eng yangi kodni tortish
            git reset --hard HEAD
            git pull origin main

            # 1. Backend-ni yangilash va qayta ishga tushirish
            echo "Backend sozlanmoqda..."
            cd backend
            npm install --production
            # Agar Prisma ishlatsangiz, pastdagi qatorni ochib yuborishingiz mumkin:
            # npx prisma migrate deploy
            pm2 restart fashion-backend || pm2 start server.js --name "fashion-backend"

            # 2. Frontend-ni yangilash va Build qilish
            echo "Frontend sozlanmoqda..."
            cd ../frontend
            npm install
            npm run build

            # Agar frontend Nginx yoki Nginx static folder orqali xizmat qarayotgan bo'lsa,
            # build bo'lgan fayllarni Nginx papkasiga ko'chirish:
            # sudo cp -r dist/* /var/www/fashionweb/

            echo "🎉 Deploy jarayoni muvaffaqiyatli yakunlandi!"
