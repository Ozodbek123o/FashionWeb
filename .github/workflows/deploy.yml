name: FashionWeb CD

on:
  workflow_run:
    workflows:
      - FashionWeb CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: Send deploy started notification
        if: secrets.SLACK_WEBHOOK_URL != ''
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: warning
          SLACK_TITLE: FashionWeb CD Started
          SLACK_MESSAGE: |
            Repository: ${{ github.repository }}
            Branch: ${{ github.event.workflow_run.head_branch || github.ref_name }}
            Environment: production
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Deploy production over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          fingerprint: ${{ secrets.SSH_FINGERPRINT }}
          script_stop: true
          script: |
            set -euo pipefail

            DEPLOY_PATH="${{ secrets.EC2_DEPLOY_PATH }}"

            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git "$DEPLOY_PATH"
            fi

            cd "$DEPLOY_PATH"
            git fetch --all --prune
            git checkout main
            git reset --hard origin/main

            cat > backend/.env <<'EOF'
            ${{ secrets.BACKEND_ENV_FILE }}
            EOF

            chmod 600 backend/.env
            chmod +x scripts/deploy-prod.sh
            ./scripts/deploy-prod.sh "$DEPLOY_PATH"

      - name: Send deploy success notification
        if: success() && secrets.SLACK_WEBHOOK_URL != ''
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: good
          SLACK_TITLE: FashionWeb CD Succeeded
          SLACK_MESSAGE: |
            Production deploy completed successfully.
            Environment: production
            URL: ${{ vars.PRODUCTION_URL }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send deploy failure notification
        if: failure() && secrets.SLACK_WEBHOOK_URL != ''
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: danger
          SLACK_TITLE: FashionWeb CD Failed
          SLACK_MESSAGE: |
            Production deploy failed.
            Environment: production
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
