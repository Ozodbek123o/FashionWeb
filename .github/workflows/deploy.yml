name: FashionWeb CI/CD Deploy Test

on:
  push:
    branches: ['main']

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Test SSH Connection to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            echo "Ulanish muvaffaqiyatli bajardi!"
            echo "Server operatsion tizimi haqida ma'lumot:"
            uname -a
            echo "Hozirgi vaqt va sana:"
            date
